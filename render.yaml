services:
  - type: web
    name: prospectai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DB_PATH
        value: /tmp/leads.db
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
